name: test
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: openai/fence@db291f5c51949e6e6ec1634621b36dc4bbf3d54a # pin@v0.8.7
        with:
          allowlist: |
            hostname pypi.org tcp 443
            hostname files.pythonhosted.org tcp 443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # pin@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pin@v6
        with:
          python-version-file: .python-version

      - name: bootstrap
        run: script/bootstrap

      - name: test
        run: script/test
