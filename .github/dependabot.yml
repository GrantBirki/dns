---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    cooldown:
      default-days: 90
    groups:
      github-actions:
        update-types:
          - minor
          - patch
    schedule:
      interval: monthly
  - package-ecosystem: uv
    directory: "/"
    cooldown:
      default-days: 90
    schedule:
      interval: monthly
    groups:
      uv:
        update-types:
          - minor
          - patch
